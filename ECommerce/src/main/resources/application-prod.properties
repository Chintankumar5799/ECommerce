server.port=8080

# --- Primary Database: PostgreSQL (Prod Env Vars) ---
spring.datasource.postgres.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.postgres.username=${POSTGRES_USER}
spring.datasource.postgres.password=${POSTGRES_PASSWORD}

# --- Secondary Database: MariaDB Vector Store (Prod Env Vars) ---
spring.datasource.mariadb.url=jdbc:mariadb://${MARIADB_HOST}:3306/${MARIADB_DB}
spring.datasource.mariadb.username=${MARIADB_USER}
spring.datasource.mariadb.password=${MARIADB_PASSWORD}

# JPA / Hibernate Prod Config (Performance & Safety)
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Prod OAuth Redirect
app.oauth2.redirect-uri=${PROD_FRONTEND_URL}/oauth-success?accessToken=
