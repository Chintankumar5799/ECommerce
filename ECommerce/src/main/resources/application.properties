spring.config.import=optional:file:.env[.properties]
spring.application.name=ECommerce

# Set Active Profile (Change this to 'prod' when deploying!)
spring.profiles.active=local

# Security & Secrets (Reads from .env)
jwt.secret=${JWT_SECRET}
stripe.api.key=${STRIPE_API_KEY}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Alloed Cors Origins
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000


# Global DB Driver Configs
spring.datasource.postgres.driver-class-name=org.postgresql.Driver
spring.datasource.mariadb.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000

# Server Tuning & File Uploads
server.tomcat.threads.max=400
server.tomcat.accept-count=150
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator & Tracing
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
spring.datasource.hikari.pool-name=ShopConnectionPool
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# AI Config (Same everywhere)
spring.ai.ollama.chat.options.model=mistral
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.init.pull-model-strategy=never
#ollama service circuit breaker
resilience4j.circuitbreaker.instances.ollamaService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ollamaService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.ollamaService.failureRateThreshold=50


# Flyway - DB Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# Resillience Rate limiting
resilience4j.ratelimiter.instances.authRateLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.authRateLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.authRateLimiter.timeoutDuration=0s




