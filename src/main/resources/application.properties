spring.application.name=ECommerce
server.port=8081


spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Random generated key
jwt.secret=tyfhjbkjhblmyuhbkngfvjhkbljblknlugbyjhghfchgvhjbjlh



#OAuth

spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# Provider (simpler, Google discovers endpoints from issuer)
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.google.user-name-attribute=sub

app.oauth2.redirect-uri=http://localhost:8081/oauth-success?accessToken=



#File Size to upload images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

